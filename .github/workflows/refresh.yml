name: Refresh market data

on:
  schedule:
    # every 30 minutes during and around US market hours (13:00–21:59 UTC ≈ 9am–5pm ET),
    # then hourly overnight so the dashboard is never badly stale
    - cron: "*/30 13-21 * * 1-5"
    - cron: "0 0-12,22-23 * * *"
  workflow_dispatch: {}

# let the scheduled job push data commits back to the repo
permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # surfacing secrets as job-level env lets the steps' `if:` test them
    # (the `secrets` context itself is not available inside `if:` expressions)
    env:
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch market data + append snapshot + evaluate alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
        run: python3 omen/update-market-data.py --snapshot --alert

      - name: Refresh influencer sentiment (optional; needs XAI_API_KEY)
        if: ${{ env.XAI_API_KEY != '' }}
        run: python3 omen/update-influencers.py

      - name: Fetch Android app charts (best-effort; feeds the consumer-app family)
        # Play has no key-free charts API, so google-play-scraper writes app-charts.json,
        # which update-china-data.py folds into the "apps" signal (iOS it fetches itself).
        # Best-effort: a scraper break must not fail the refresh — the Python step then
        # carries the previous computed value or the manual snapshot.
        run: |
          cd omen
          npm install --no-save --silent google-play-scraper@10 && node update-app-charts.mjs \
            || echo "app-charts fetch failed — china-data will fall back"

      - name: Refresh China AI monitor snapshot data
        # Slow-moving fields for china-ai-monitor.html (leaderboard ranks, GitHub star
        # velocity, OpenRouter weekly share, Vercel gateway share, Ollama pulls, Kalshi
        # odds, fine-tune trees, SDK installs, consumer-app chart presence). The page
        # fetches the fast data live in-browser; this only regenerates china-data.json.
        # Both keys are optional: without ARTIFICIAL_ANALYSIS_API_KEY the AA scores stay
        # a dated snapshot; without CF_RADAR_TOKEN the Radar panel stays hidden.
        env:
          ARTIFICIAL_ANALYSIS_API_KEY: ${{ secrets.ARTIFICIAL_ANALYSIS_API_KEY }}
          CF_RADAR_TOKEN: ${{ secrets.CF_RADAR_TOKEN }}
        run: python3 omen/update-china-data.py

      - name: Refresh AI CapEx live tape
        # TSMC monthly revenue (TWSE), EDGAR issuance counts, Ramp AI Index,
        # Anthropic Economic Index freshness -> capex-data.json for ai-capex.html.
        # EIA_API_KEY (free, eia.gov/opendata) additionally unlocks the EIA-860M
        # generator pipeline; without it that block is null and the page says so.
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python3 omen/update-capex-data.py

      - name: Refresh China AI event timeline (optional; needs XAI_API_KEY)
        # Recent Chinese-model catalysts via Grok Live Search -> china-events.json, which
        # the China monitor merges on top of its curated timeline. Self-gated to run the
        # (paid) model call at most once per ~24h; no-ops without the key, so the page
        # falls back to the curated timeline.
        if: ${{ env.XAI_API_KEY != '' }}
        run: python3 omen/update-china-events.py

      # Push the fresh data straight to R2 so the Worker serves it live, with no redeploy.
      # Skips cleanly if the Cloudflare secrets aren't set (the site then falls back to
      # the bundled copy, i.e. previous behaviour).
      - name: Upload data to R2
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          # A missing optional file (e.g. influencers.json without XAI_API_KEY) must skip,
          # not fail the step — otherwise `bash -e` would kill the run and skip the commit.
          # A real upload failure still propagates and fails the step.
          put() {
            [ -f "omen/$1" ] || { echo "omen/$1 absent — skipping"; return 0; }
            npx --yes wrangler@4 r2 object put "omen-data/$1" --file "omen/$1" --content-type "$2" --remote
          }
          put market-data.json "application/json"
          put snapshots.csv    "text/csv"
          put influencers.json "application/json"
          put china-events.json "application/json"
          put capex-data.json  "application/json"

      - name: Commit refreshed data
        run: |
          git config user.name "ai-crash-monitor bot"
          git config user.email "actions@github.com"
          for f in omen/market-data.json omen/snapshots.csv omen/alert-state.json omen/influencers.json \
                   omen/china-data.json omen/china-history.json omen/china-snapshots.csv omen/china-events.json \
                   omen/app-charts.json omen/capex-data.json omen/capex-snapshots.csv; do
            [ -f "$f" ] && git add -f "$f"
          done
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
