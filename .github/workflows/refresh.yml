name: Refresh market data

on:
  schedule:
    # every 30 minutes during and around US market hours (13:00–21:59 UTC ≈ 9am–5pm ET),
    # then hourly overnight so the dashboard is never badly stale
    - cron: "*/30 13-21 * * 1-5"
    - cron: "0 0-12,22-23 * * *"
  workflow_dispatch: {}

# let the scheduled job push data commits back to the repo
permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # surfacing secrets as job-level env lets the steps' `if:` test them
    # (the `secrets` context itself is not available inside `if:` expressions)
    env:
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch market data + append snapshot + evaluate alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python3 omen/update-market-data.py --snapshot --alert

      - name: Refresh influencer sentiment (optional; needs XAI_API_KEY)
        if: ${{ env.XAI_API_KEY != '' }}
        run: python3 omen/update-influencers.py

      # Push the fresh data straight to R2 so the Worker serves it live, with no redeploy.
      # Skips cleanly if the Cloudflare secrets aren't set (the site then falls back to
      # the bundled copy, i.e. previous behaviour).
      - name: Upload data to R2
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          put() { npx --yes wrangler@4 r2 object put "omen-data/$1" --file "omen/$1" --content-type "$2" --remote; }
          [ -f omen/market-data.json ] && put market-data.json "application/json"
          [ -f omen/snapshots.csv ]    && put snapshots.csv    "text/csv"
          [ -f omen/influencers.json ] && put influencers.json "application/json"

      - name: Commit refreshed data
        run: |
          git config user.name "ai-crash-monitor bot"
          git config user.email "actions@github.com"
          for f in omen/market-data.json omen/snapshots.csv omen/alert-state.json omen/influencers.json; do
            [ -f "$f" ] && git add -f "$f"
          done
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
