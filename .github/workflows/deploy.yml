name: Deploy site

on:
  push:
    branches: [main]
    paths:
      # site code only — the scheduled data refresh goes straight to R2 and
      # must not trigger a redeploy
      - "omen/**"
      - "!omen/market-data.json"
      - "!omen/market-data.js"
      - "!omen/snapshots.csv"
      - "!omen/influencers.json"
      - "!omen/alert-state.json"
      - "worker.js"
      - "wrangler.jsonc"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Worker + static assets
        run: npx --yes wrangler@4 deploy
